<!DOCTYPE html>
<html lang="en">
<head>

    <meta charset="UTF-8">
    <title>gameplayer</title>
    <link rel="stylesheet" href="style2.css">
</head>
<body>
    <embed
            id="playgame"
            type="application/x-shockwave-flash"
            src="alien_hominid.swf"
            class="embed"
    />
    <script src="ruffle-nightly-2026_04_25-web-selfhosted/ruffle.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search)
        const game = params.get('game')
        let file = game + ".swf"
        document.getElementById("playgame").src = file
    </script>
</body>
</html>
